name: Configure and build firmware

on:
  workflow_dispatch:
    inputs:
      openwrt_hash:
        description: 'The hash of OpenWRT to clone'
        required: true
      diffconfig:
        description: 'The name of the diffconfig to use'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone latest OpenWRT
        env: 
          OPENWRT_HASH: ${{ inputs.openwrt_hash }}
        run: git clone --depth 1 https://github.com/openwrt/openwrt.git --revision=$OPENWRT_HASH
      
      - name: Copy diffconfig and files
        env:
          DIFFCONFIG: ${{ inputs.diffconfig }}
        run: | 
          cp configs/${{ inputs.diffconfig }} openwrt/.config
          cp -r files openwrt/

      - name: Apply patchset
        working-directory: openwrt
        run: git apply ../patches/*

      - name: Update feeds
        working-directory: openwrt
        run: |
          scripts/feeds update -a
          scripts/feeds install -a
      
      - name: Make firmware
        working-directory: openwrt
        run: make defconfig download clean world   

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets
